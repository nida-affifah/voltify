services:
  - type: web
    name: voltify-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 5555
      - key: DATABASE_URL
        fromDatabase:
          name: voltify-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: voltify-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://voltify-backend.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: postgresql
    name: voltify-db
    plan: free
